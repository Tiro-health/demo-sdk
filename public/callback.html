<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #f5f5f5;
        color: #171717;
      }
      .container {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .tabs {
        display: flex;
        gap: 0;
        background: #fff;
        border-bottom: 1px solid #e5e5e5;
        padding: 0 16px;
      }
      .tab {
        padding: 12px 20px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        color: #737373;
        border-bottom: 2px solid transparent;
        background: none;
        border-top: none;
        border-left: none;
        border-right: none;
        transition: color 0.15s, border-color 0.15s;
      }
      .tab:hover {
        color: #171717;
      }
      .tab.active {
        color: #2563eb;
        border-bottom-color: #2563eb;
      }
      .tab-content {
        flex: 1;
        display: none;
        min-height: 0;
      }
      .tab-content.active {
        display: flex;
      }
      .pdf-placeholder {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #a3a3a3;
        font-size: 14px;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .json-view {
        flex: 1;
        overflow: auto;
        padding: 16px;
      }
      .json-view pre {
        font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, monospace;
        font-size: 13px;
        line-height: 1.5;
        background: #fff;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        padding: 16px;
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      #loading {
        display: none;
        flex: 1;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        color: #737373;
      }
      #loading.active {
        display: flex;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e5e5e5;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #error {
        display: none;
        flex: 1;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 8px;
      }
      #error.active {
        display: flex;
      }
      #error p { color: #dc2626; font-weight: 500; }
      #error pre {
        color: #737373;
        font-size: 12px;
        max-width: 600px;
        white-space: pre-wrap;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="tabs">
        <button class="tab active" data-tab="pdf">PDF</button>
        <button class="tab" data-tab="qr">QuestionnaireResponse</button>
      </div>

      <div id="tab-pdf" class="tab-content active">
        <div id="loading">
          <div class="spinner"></div>
          <span>Generating PDF…</span>
        </div>
        <div id="error">
          <p>Failed to render PDF</p>
          <pre id="error-detail"></pre>
        </div>
        <div class="pdf-placeholder">
          <iframe id="pdf-viewer" style="display: none"></iframe>
          <span id="pdf-placeholder-text"></span>
        </div>
      </div>

      <div id="tab-qr" class="tab-content">
        <div class="json-view">
          <pre id="qr-json"></pre>
        </div>
      </div>
    </div>

    <script>
      function highlightJson(json) {
        return json.replace(
          /("(?:\\.|[^"\\])*")\s*(:)?|(\btrue\b|\bfalse\b|\bnull\b)|(-?\d+\.?\d*)/g,
          (match, str, colon, bool, num) => {
            if (str) {
              return colon
                ? `<span style="color:#2563eb">${str}</span>:`
                : `<span style="color:#16a34a">${str}</span>`;
            }
            if (bool) return `<span style="color:#d97706">${bool}</span>`;
            if (num) return `<span style="color:#dc2626">${num}</span>`;
            return match;
          }
        );
      }

      // Tab switching
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
          document.querySelectorAll(".tab-content").forEach((c) => c.classList.remove("active"));
          tab.classList.add("active");
          document.getElementById(`tab-${tab.dataset.tab}`).classList.add("active");
        });
      });

      // Read FHIR references from URL params
      const SDC_BASE = "https://sdc.tiro.health";
      const urlParams = new URLSearchParams(window.location.search);
      const compositionRef = urlParams.get("composition");
      const responseRef = urlParams.get("response");
      const subjectRef = urlParams.get("subject");

      const loadingEl = document.getElementById("loading");
      const errorEl = document.getElementById("error");
      const errorDetail = document.getElementById("error-detail");
      const viewer = document.getElementById("pdf-viewer");
      const placeholderText = document.getElementById("pdf-placeholder-text");

      function showError(message) {
        loadingEl.classList.remove("active");
        errorEl.classList.add("active");
        errorDetail.textContent = message;
        console.error("Callback error:", message);
      }

      function loadResource(ref) {
        const raw = localStorage.getItem(ref);
        if (!raw) throw new Error(`Resource not found in localStorage: ${ref}`);
        return JSON.parse(raw);
      }

      // Populate QR tab if response is available
      if (responseRef) {
        try {
          const qr = loadResource(responseRef);
          document.getElementById("qr-json").innerHTML =
            highlightJson(JSON.stringify(qr, null, 2));
        } catch (e) {
          console.error("Failed to load QuestionnaireResponse:", e);
        }
      }

      // PDF tab: render composition
      if (!compositionRef) {
        placeholderText.textContent = "No composition provided";
      } else {
        loadingEl.classList.add("active");

        try {
          const composition = loadResource(compositionRef);
          const body = { composition };

          if (responseRef) {
            try {
              body.response = loadResource(responseRef);
            } catch (_) {
              // response is optional for rendering
            }
          }

          console.log("Loaded resources for render:", body);

          fetch(
            `${SDC_BASE}/fhir/r5/Composition/$render?format=pdf`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Accept: "application/pdf",
              },
              body: JSON.stringify(body),
            },
          )
            .then((res) => {
              if (!res.ok) {
                return res.text().then((text) => {
                  throw new Error(`${res.status}: ${text}`);
                });
              }
              return res.blob();
            })
            .then((blob) => {
              loadingEl.classList.remove("active");
              viewer.style.display = "";
              viewer.src = URL.createObjectURL(blob);
            })
            .catch((err) => showError(err.message));
        } catch (err) {
          showError(err.message);
        }
      }
    </script>
  </body>
</html>
